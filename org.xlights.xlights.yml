app-id: org.xlights.xLights
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: xLights

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all          # USB/serial for DMX/E1.31 dongles
  - --filesystem=home     # show directory, media files
  - --filesystem=/media   # external drives
  - --filesystem=/run/udev:ro  # udev for device enumeration

modules:

  - name: zstd
    buildsystem: cmake-ninja
    subdir: build/cmake
    config-opts:
      - -DZSTD_BUILD_PROGRAMS=OFF
      - -DZSTD_BUILD_TESTS=OFF
    sources:
      - type: archive
        url: https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz
        sha256: 8c29e06cf42aacc1eafc4077ae2ec6c6fcb96a626157e0593d5e82a34fd403c1

  - name: lua
    buildsystem: simple
    build-commands:
      - make linux MYCFLAGS="-fPIC"
      - make install INSTALL_TOP=/app
    sources:
      - type: archive
        url: https://www.lua.org/ftp/lua-5.4.7.tar.gz
        sha256: 9fbf5e28ef86c69858f6d3d34eccc32e911c1a28b4120ff3e84aaa70cfbf1e30

  - name: libxlsxwriter
    buildsystem: cmake-ninja
    config-opts:
      - -DUSE_SYSTEM_MINIZIP=OFF
    sources:
      - type: git
        url: https://github.com/jmcnamara/libxlsxwriter.git
        tag: v1.1.8

  - name: nanosvg
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/memononen/nanosvg.git
        commit: 5cefd9847949af6df13f65027fd43af5a7513633
        
  - name: x264
    config-opts:
      - --prefix=/app
      - --enable-shared
      - --disable-static
      - --disable-cli
      - --enable-pic
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        commit: 0480cb05fa188d37ae87e8f4fd8f1aea3711f7ee

  - name: x265
    buildsystem: cmake-ninja
    subdir: source
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DENABLE_SHARED=ON
      - -DENABLE_STATIC=OFF
      - -DENABLE_CLI=OFF
    sources:
      - type: archive
        url: https://bitbucket.org/multicoreware/x265_git/downloads/x265_3.6.tar.gz
        sha256: 663531f341c5389f460d730e62e10a4fcca3428ca2ca109693867bc5fe2e2807

  - name: lame
    config-opts:
      - --prefix=/app
      - --enable-shared
      - --disable-static
      - --disable-frontend
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/lame/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e

  - name: ffmpeg
    config-opts:
      - --prefix=/app
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --enable-gpl
      - --enable-version3
      - --enable-libvorbis
      - --enable-libopus
      - --enable-libmp3lame
      - --enable-libx264
      - --enable-libx265
      - --enable-libvpx
      - --enable-libtheora
      - --enable-libfreetype
      - --disable-debug
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6
    cleanup:
      - /share/ffmpeg/examples

  - name: SDL2
    config-opts:
      - --prefix=/app
      - --disable-arts
      - --disable-esd
      - --disable-nas
      - --enable-alsa
      - --enable-pulseaudio
      - --enable-video-wayland
      - --enable-video-x11
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL/releases/download/release-2.30.10/SDL2-2.30.10.tar.gz
        sha256: f59adf36a0fcf4c94198e7d3d776c1b3824211ab7aeebeb31fe19836661196aa

  - name: liquidfun
    buildsystem: simple
    build-commands:
      # liquidfun has no CMake install() rules, so cmake-ninja would fail at
      # "ninja install". Build manually and copy just what xLights needs.
      - cmake -G Ninja liquidfun/Box2D
          -DBOX2D_BUILD_EXAMPLES=OFF
          -DBOX2D_BUILD_UNITTESTS=OFF
          -DCMAKE_CXX_FLAGS=-w
          -DCMAKE_BUILD_TYPE=Release
          -Bbuild_lf
      - ninja -C build_lf -j$(nproc)
      # The library is built as Box2D/libBox2D.a inside the build dir.
      # Install it as libliquidfun.a so xLights' Makefile and CMakeLists find it.
      - install -Dm644 build_lf/Box2D/libliquidfun.a /app/lib/libliquidfun.a
      # Install headers that xLights includes via dependencies/liquidfun/liquidfun/Box2D
      - cp -r liquidfun/Box2D/Box2D /app/include/liquidfun
    sources:
      - type: git
        url: https://github.com/google/liquidfun.git
        commit: 7f20402173fd143a3988c921bc384459c6a858f2

  - name: wxWidgets
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --with-gtk=3
      - --with-opengl
      - --enable-unicode
      - --disable-debug
      - --enable-shared
      - --with-libjpeg=sys
      - --with-libpng=sys
      - --with-libtiff=sys
      - --with-zlib=sys
      - --with-expat=sys
    sources:
      - type: git
        url: https://github.com/xLightsSequencer/wxWidgets.git
        branch: master

  - name: xLights
    buildsystem: simple
    build-options:
      cflags: -I/app/include
      cxxflags: -I/app/include -std=gnu++20
      ldflags: -L/app/lib
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
    build-commands:
      - make xLights -j$(nproc)
      - install -Dm755 bin/xLights /app/bin/xLights
      - install -Dm644 xLights/xLights.desktop /app/share/applications/org.xlights.xLights.desktop
      - install -Dm644 xLights/icons/xLights.png /app/share/icons/hicolor/256x256/apps/org.xlights.xLights.png
      - install -Dm644 org.xlights.xLights.metainfo.xml /app/share/metainfo/org.xlights.xLights.metainfo.xml
    sources:
      - type: git
        url: https://github.com/xLightsSequencer/xLights.git
        branch: master
